# ============================================================
# External Secrets — GCP Secret Manager Integration
# ============================================================
# This file uses the External Secrets Operator (ESO) to pull
# secrets from Google Cloud Secret Manager into Kubernetes.
#
# Install ESO first:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Then apply a ClusterSecretStore pointing to GCP:
# ============================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: YOUR_GCP_PROJECT_ID # ← Replace with your GCP project ID
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: YOUR_CLUSTER_NAME # ← Replace with your GKE cluster name
          serviceAccountRef:
            name: Swaggies-sa
            namespace: Swaggies
---
# Auth Service Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: Swaggies
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: auth-service-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: Swaggies-jwt-secret
    - secretKey: REFRESH_TOKEN_SECRET
      remoteRef:
        key: Swaggies-refresh-token-secret
    - secretKey: MONGO_URI
      remoteRef:
        key: Swaggies-auth-mongo-uri
    - secretKey: MAILTRAP_TOKEN
      remoteRef:
        key: Swaggies-mailtrap-token
    - secretKey: RESEND_TOKEN
      remoteRef:
        key: Swaggies-resend-token
---
# User Service Secrets
apiVersion: external-secrets.io/v1beta1
