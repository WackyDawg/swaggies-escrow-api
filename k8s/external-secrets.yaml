# ============================================================
# External Secrets — GCP Secret Manager Integration
# ============================================================
# This file uses the External Secrets Operator (ESO) to pull
# secrets from Google Cloud Secret Manager into Kubernetes.
#
# Prerequisites:
# 1. Install ESO:
#      helm repo add external-secrets https://charts.external-secrets.io
#      helm install external-secrets external-secrets/external-secrets \
#        -n external-secrets --create-namespace
#
# 2. Create the namespace (must be lowercase):
#      kubectl create namespace swaggies
#
# 3. Create and annotate the Kubernetes Service Account (KSA):
#      kubectl create serviceaccount swaggies-sa -n swaggies
#      kubectl annotate serviceaccount swaggies-sa \
#        -n swaggies \
#        iam.gke.io/gcp-service-account=YOUR_GSA@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com
#
# 4. Bind the GCP IAM Service Account (GSA) to the KSA:
#      gcloud iam service-accounts add-iam-policy-binding \
#        YOUR_GSA@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com \
#        --role roles/iam.workloadIdentityUser \
#        --member "serviceAccount:YOUR_GCP_PROJECT_ID.svc.id.goog[swaggies/swaggies-sa]"
#
# 5. Grant Secret Manager access to the GSA:
#      gcloud projects add-iam-policy-binding YOUR_GCP_PROJECT_ID \
#        --role roles/secretmanager.secretAccessor \
#        --member serviceAccount:YOUR_GSA@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com
#
# Replace all YOUR_* placeholders before applying.
# Apply with: kubectl apply -f external-secrets.yaml
# ============================================================

# ============================================================
# Kubernetes Service Account
# PATCH: Annotated with GCP IAM Service Account for
#        Workload Identity binding.
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: swaggies-sa # PATCH: lowercased
  namespace: swaggies # PATCH: lowercased
  annotations:
    iam.gke.io/gcp-service-account: YOUR_GSA@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com # ← Replace

---
# ============================================================
# ClusterSecretStore — GCP Secret Manager
# PATCH: namespace lowercased; serviceAccountRef namespace
#        lowercased to match actual KSA namespace.
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: YOUR_GCP_PROJECT_ID # ← Replace with your GCP project ID
      auth:
        workloadIdentity:
          clusterLocation: YOUR_CLUSTER_REGION # ← Replace (e.g. us-central1)
          clusterName: YOUR_CLUSTER_NAME # ← Replace with your GKE cluster name
          serviceAccountRef:
            name: swaggies-sa # PATCH: lowercased
            namespace: swaggies # PATCH: lowercased

---
# ============================================================
# Auth Service Secrets
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: swaggies # PATCH: lowercased
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: auth-service-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: swaggies-jwt-secret
    - secretKey: REFRESH_TOKEN_SECRET
      remoteRef:
        key: swaggies-refresh-token-secret
    - secretKey: MONGO_URI
      remoteRef:
        key: swaggies-auth-mongo-uri
    - secretKey: MAILTRAP_TOKEN
      remoteRef:
        key: swaggies-mailtrap-token
    - secretKey: RESEND_TOKEN
      remoteRef:
        key: swaggies-resend-token

