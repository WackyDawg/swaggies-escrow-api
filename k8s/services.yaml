#Wallet Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: Swaggies
  labels:
    app: wallet-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: wallet-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: Swaggies-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: wallet-service
          image: REGION-docker.pkg.dev/YOUR_GCP_PROJECT_ID/Swaggies/wallet-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
            - containerPort: 5003
              name: grpc
          envFrom:
            - configMapRef:
                name: Swaggies-config
            - secretRef:
                name: wallet-service-secret
          env:
            - name: PORT
              value: "3003"
            - name: SERVICE_NAME
              value: "wallet-service"
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: Swaggies
spec:
  type: ClusterIP
  selector:
    app: wallet-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
    - name: grpc
      port: 5003
      targetPort: 5003
---
