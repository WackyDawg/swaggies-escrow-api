apiVersion: v1
kind: Namespace
metadata:
  name: Swaggies
  labels:
    name: Swaggies
    environment: production
    managed-by: kubectl
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: Swaggies-resource-quota
  namespace: Swaggies
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "50"
    services: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: Swaggies-limits
  namespace: Swaggies
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      type: Container
