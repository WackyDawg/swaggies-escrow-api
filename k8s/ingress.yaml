# GKE Ingress with Google-Managed TLS Certificate
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: swaggies-ingress
  namespace: swaggies
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "swaggies-static-ip"
    networking.gke.io/v1beta1.FrontendConfig: "swaggies-frontend-config"
spec:
  rules:
    - http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /invoice
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /tracking
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /api-docs
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /pay-invoice
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
---

---
# Frontend Config — HTTPS redirect
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: swaggies-frontend-config
  namespace: swaggies
spec:
  redirectToHttps:
    enabled: false
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
