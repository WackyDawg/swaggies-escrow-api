# ============================================================
# NetworkPolicy — Zero-Trust Network Security
# Default: deny all ingress/egress. Allow only explicit paths.
# ============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: Swaggies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: Swaggies
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: Swaggies
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: wallet-service
      ports:
        - port: 3003
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 3004
        - port: 5004
    - to:
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - port: 3005
    - to:
        - podSelector:
            matchLabels:
              app: budget-service
      ports:
        - port: 3006
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-policy
  namespace: Swaggies
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3001
    - from:
        - podSelector: {}
      ports:
        - port: 5001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 5004
    - to:
        - podSelector:
            matchLabels:
              app: wallet-service
      ports:
        - port: 5003

    - ports:
        - port: 587
        - port: 465
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wallet-service-policy
  namespace: Swaggies
spec:
  podSelector:
    matchLabels:
      app: wallet-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3003
    - from:
        - podSelector: {}
      ports:
        - port: 5003
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 5004
    # External payment provider API (Monnify)
    - ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-service-policy
  namespace: Swaggies
spec:
  podSelector:
    matchLabels:
      app: payment-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3005
  egress:
    - ports:
        - port: 443 # External payment providers (Paystack, Stripe, etc.)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: internal-services-policy
  namespace: Swaggies
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
