# ============================================================
# ServiceAccount with Workload Identity for GCP
# ============================================================
# This binds a Kubernetes ServiceAccount to a GCP Service Account,
# giving pods the ability to access GCP Secret Manager, Cloud Storage,
# etc. — without mounting service account key files (keyless auth).
#
# Prerequisites:
#   1. Create GCP service account:
#      gcloud iam service-accounts create swaggies-sa \
#        --project=YOUR_GCP_PROJECT_ID
#
#   2. Grant Secret Manager access:
#      gcloud projects add-iam-policy-binding YOUR_GCP_PROJECT_ID \
#        --member="serviceAccount:swaggies-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com" \
#        --role="roles/secretmanager.secretAccessor"
#
#   3. Bind Workload Identity:
#      gcloud iam service-accounts add-iam-policy-binding \
#        swaggies-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com \
#        --role="roles/iam.workloadIdentityUser" \
#        --member="serviceAccount:YOUR_GCP_PROJECT_ID.svc.id.goog[swaggies/swaggies-sa]"
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: swaggies-sa
  namespace: swaggies
  annotations:
    # Workload Identity annotation — links KSA to GSA
    iam.gke.io/gcp-service-account: swaggies-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com
  labels:
    app: swaggies
    managed-by: kubectl
